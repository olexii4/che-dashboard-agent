# Dashboard Agent DevWorkspace Template
# This devfile defines a headless agent workspace (no editor) that runs
# Claude Code with an xterm.js terminal server accessible from the dashboard.
#
# The terminal server starts automatically as the container's default CMD
# on port 8080 and the dashboard connects to it over WebSocket at /terminal.
#
# The label che.eclipse.org/workspace-type=agent separates this from
# regular workspaces in the dashboard UI.

schemaVersion: 2.2.2
metadata:
  name: devfile-agent
  attributes:
    controller.devfile.io/storage-type: ephemeral
  labels:
    che.eclipse.org/workspace-type: agent
components:
  - name: dashboard-agent
    container:
      image: quay.io/oorel/dashboard-agent:latest
      memoryLimit: 2Gi
      cpuLimit: '1'
      mountSources: false
      endpoints:
        - name: terminal-server
          targetPort: 8080
          exposure: internal
          protocol: ws
      env:
        - name: ANTHROPIC_API_KEY
          value: ''
